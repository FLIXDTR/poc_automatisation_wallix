---
- name: Validate credential definition
  ansible.builtin.assert:
    that:
      - wallix_credential.type is defined
      - (wallix_credential.type | string) in ['password']
    fail_msg: "Unsupported credential type (PoC supports only 'password'): {{ wallix_credential | default({}) }}"

- name: Resolve credential secret
  vars:
    resolved_password: >-
      {{
        (wallix_credential.password | default('') | string)
        if (wallix_credential.password is defined and (wallix_credential.password | string | length) > 0)
        else (lookup('env', wallix_credential.password_env | default('')) | default('', true))
      }}
    existing: >-
      {{
        (wallix_creds_list.json | default([]))
        | selectattr('type', 'equalto', (wallix_credential.type | string))
        | list
        | first
        | default({})
      }}
  ansible.builtin.set_fact:
    wallix_credential_required: "{{ wallix_credential.required | default(true) | bool }}"
    wallix_credential_resolved_password: "{{ resolved_password }}"
    wallix_credential_existing: "{{ existing }}"
    wallix_credential_exists: "{{ existing | length > 0 }}"
  no_log: true
  changed_when: false

- name: Validate password secret is provided for {{ wallix_device_name }} {{ wallix_domain_name }} {{ wallix_account_name }}
  ansible.builtin.assert:
    that:
      - wallix_credential_resolved_password | length > 0
    fail_msg: >-
      Missing password secret for {{ wallix_device_name }} {{ wallix_domain_name }} {{ wallix_account_name }}.
      Provide `password` or set env var referenced by `password_env`.
  no_log: true
  when: wallix_credential_required | bool

- name: Skip credential because secret is missing (not required)
  ansible.builtin.debug:
    msg: >-
      Skipping credential for {{ wallix_device_name }} {{ wallix_domain_name }} {{ wallix_account_name }}
      because no secret was provided and this credential is marked required=false.
  changed_when: false
  when:
    - not wallix_credential_required | bool
    - wallix_credential_resolved_password | length == 0

- name: Create password credential when missing
  ansible.builtin.uri:
    url: "{{ wallix_resolved_api_url }}/api/devices/{{ wallix_device_name }}/localdomains/{{ wallix_domain_name }}/accounts/{{ wallix_account_name }}/credentials"
    method: POST
    headers: "{{ wallix_auth_headers | default({}) | to_json | from_json }}"
    url_username: "{{ wallix_api_user if (wallix_auth_headers | default({}) | length == 0) else omit }}"
    url_password: "{{ wallix_api_password if (wallix_auth_headers | default({}) | length == 0) else omit }}"
    force_basic_auth: "{{ (wallix_auth_headers | default({}) | length == 0) | bool }}"
    validate_certs: "{{ wallix_validate_certs | bool }}"
    body_format: json
    body:
      type: "password"
      password: "{{ wallix_credential_resolved_password }}"
    status_code: [200, 201, 204]
  changed_when: true
  no_log: true
  when:
    - not wallix_credential_exists | bool
    - wallix_credential_resolved_password | length > 0

- name: Update password credential when present (ensure desired secret)
  ansible.builtin.uri:
    url: >-
      {{ wallix_resolved_api_url }}/api/devices/{{ wallix_device_name }}/localdomains/{{ wallix_domain_name }}/accounts/{{ wallix_account_name }}/credentials/{{ wallix_credential_existing.id }}
    method: PUT
    headers: "{{ wallix_auth_headers | default({}) | to_json | from_json }}"
    url_username: "{{ wallix_api_user if (wallix_auth_headers | default({}) | length == 0) else omit }}"
    url_password: "{{ wallix_api_password if (wallix_auth_headers | default({}) | length == 0) else omit }}"
    force_basic_auth: "{{ (wallix_auth_headers | default({}) | length == 0) | bool }}"
    validate_certs: "{{ wallix_validate_certs | bool }}"
    body_format: json
    body:
      password: "{{ wallix_credential_resolved_password }}"
    status_code: [200, 204]
  changed_when: true
  no_log: true
  when:
    - wallix_credential_exists | bool
    - wallix_credential_resolved_password | length > 0

