---
- name: Skip credentials when none configured for {{ wallix_device_name }} {{ wallix_domain_name }} {{ wallix_account_name }}
  ansible.builtin.debug:
    msg: "No credentials configured for {{ wallix_device_name }} {{ wallix_domain_name }} {{ wallix_account_name }}."
  changed_when: false
  when: wallix_account_credentials is not defined or (wallix_account_credentials | length == 0)

- name: Fetch existing credentials for {{ wallix_device_name }} {{ wallix_domain_name }} {{ wallix_account_name }}
  ansible.builtin.uri:
    url: "{{ wallix_resolved_api_url }}/api/devices/{{ wallix_device_name }}/localdomains/{{ wallix_domain_name }}/accounts/{{ wallix_account_name }}/credentials?limit=1000"
    method: GET
    headers: "{{ wallix_auth_headers | default({}) | to_json | from_json }}"
    url_username: "{{ wallix_api_user if (wallix_auth_headers | default({}) | length == 0) else omit }}"
    url_password: "{{ wallix_api_password if (wallix_auth_headers | default({}) | length == 0) else omit }}"
    force_basic_auth: "{{ (wallix_auth_headers | default({}) | length == 0) | bool }}"
    validate_certs: "{{ wallix_validate_certs | bool }}"
    status_code: [200]
  register: wallix_creds_list
  changed_when: false
  when: wallix_account_credentials is defined and (wallix_account_credentials | length > 0)

- name: Ensure configured credentials exist for {{ wallix_device_name }} {{ wallix_domain_name }} {{ wallix_account_name }}
  ansible.builtin.include_tasks: manage_device_credential.yml
  loop: "{{ wallix_account_credentials | default([]) }}"
  loop_control:
    loop_var: wallix_credential
    label: "{{ wallix_credential.type | default('missing_type') }}"
  when: wallix_account_credentials is defined and (wallix_account_credentials | length > 0)
